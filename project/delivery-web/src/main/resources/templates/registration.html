<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Registration</title>
  <style>
    form { display: flex; flex-direction: column; width: 250px; gap: 8px; }
    input, select { padding: 5px; }
  </style>
</head>
<body>
<h2>Create Account</h2>
<form th:action="@{/register}" method="post">
  <select name="role">
    <option value="customer">Customer</option>
    <option value="driver">Driver</option>
  </select>
  <input type="text" name="username" placeholder="Username" required>
  <input type="text" name="name" placeholder="First Name" required>
  <input type="text" name="surname" placeholder="Last Name" required>
  <input type="email" name="email" placeholder="Email" required>
  <input type="text" name="phoneNumber" placeholder="Phone (9 digits)" maxlength="9">
  <input type="password" name="passwordHash" placeholder="Password" required>
  <input type="password" name="passwordRepeat" placeholder="Repeat Password" required>

  <button type="submit">Register</button>
</form>
<p th:if="${error}" style="color: #7d1616;" th:text="${error}"></p>
<p th:if="${param.success}">Success! User created.</p>
</body>
</html>
