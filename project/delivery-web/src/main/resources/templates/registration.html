<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>
<h2>Sign Up</h2>
<form action="/register" method="post">
    <label>I am a:</label>
    <select name="role">
        <option value="customer">Customer</option>
        <option value="driver">Driver</option>
    </select><br><br>

    <input type="text" name="username" placeholder="Username" required><br>
    <input type="text" name="name" placeholder="First Name" required><br>
    <input type="text" name="surname" placeholder="Last Name" required><br>
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="text" name="phoneNumber" placeholder="Phone Number"><br>
    <input type="password" name="passwordHash" placeholder="Password" required><br>
    <input type="password" name="passwordRepeat" placeholder="Repeat Password" required><br>

    <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="/login">Login here</a></p>
</body>
</html>
