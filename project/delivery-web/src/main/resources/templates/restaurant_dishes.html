<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${restaurant.restaurantName} + ' Menu'"></title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body style="margin: 0; display: flex; flex-direction: column; min-height: 100vh;">

<div th:replace="~{fragments :: navbar}"></div>

<div style="flex: 1;">
    <div class="glass-panel">
        <div style="border-bottom: 2px solid #79a0c3; padding-bottom: 15px; margin-bottom: 25px;">
            <h1 style="margin: 0; color: #2c3e50;">
                <span th:text="${restaurant.restaurantName}">Restaurant</span> — Menu
            </h1>
        </div>

        <form class="search-container" method="get"
              th:action="@{/customer/restaurant/{id}/search(id=${restaurant.restaurantId})}">
            <input name="query" placeholder="Search for a dish in this menu..." th:value="${dishQuery}" type="text">
            <button class="btn-main" type="submit">Find</button>
            <a style="padding: 10px; color: #fa5252; text-decoration: none;"
               th:href="@{/customer/restaurant/{id}(id=${restaurant.restaurantId})}"
               th:if="${dishQuery != null}">Reset</a>
        </form>

        <div class="dish-container">
            <div class="dish-item" th:each="dish : ${dishes}">
                <div class="dish-info">
                    <h3 th:text="${dish.dishName}">Dish Name</h3>
                    <p th:text="${dish.description}">Description</p>
                </div>

                <div class="dish-price-action">
                    <span class="price-tag" th:text="${dish.activePrice + ' $'}">0.00 $</span>
                    <form method="post" style="display: flex; align-items: center; gap: 8px;"
                          th:action="@{/customer/cart/add}">
                        <input name="dishId" th:value="${dish.dishId}" type="hidden">
                        <input max="10" min="1" name="quantity"
                               style="width: 50px; padding: 8px; border-radius: 8px; border: 1px solid #ddd;"
                               type="number"
                               value="1">
                        <button class="btn-main" style="padding: 8px 15px;" type="submit">+ Add</button>
                    </form>
                </div>
            </div>
        </div>

        <div style="margin-top: 50px;">
            <h2 style="color: #2c3e50;">Reviews & Ratings</h2>

            <div class="auth-container"
                 style="max-width: 100%; margin: 20px 0; background: white; border: 1px solid #eee; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"
                 th:if="${!hasReviewed}">
                <h3 style="margin-top: 0; color: #2c3e50;">Leave a Review</h3>
                <form method="post" th:action="@{/customer/restaurant/add-review}">
                    <input name="restaurantId" th:value="${restaurant.restaurantId}" type="hidden">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold;">Rating</label>
                        <select class="ai-input" name="rating" style="width: auto; min-width: 180px; height: 45px;">
                            <option value="5">5 ★ Excellent</option>
                            <option value="4">4 ★ Very Good</option>
                            <option value="3">3 ★ Average</option>
                            <option value="2">2 ★ Poor</option>
                            <option value="1">1 ★ Terrible</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <textarea name="comment" placeholder="Share your experience..." required
                                  style="width: 100%; height: 100px; border-radius: 12px; padding: 15px; border: 1px solid #ddd; font-family: inherit; resize: none;"></textarea>
                    </div>
                    <button class="btn-main" style="width: 100%; padding: 15px;" type="submit">Post Review</button>
                </form>
            </div>

            <div style="padding: 20px; background: rgba(121, 160, 195, 0.1); border: 1px solid #79a0c3; color: #4a6a8a; border-radius: 15px; margin-bottom: 30px; text-align: center;"
                 th:if="${hasReviewed}">
                <span style="font-size: 1.5em;">✨</span>
                <p style="margin: 5px 0 0 0; font-weight: bold;">You have already shared your feedback for this
                    restaurant!</p>
            </div>

            <div style="margin-top: 30px;">
                <div class="review-card"
                     style="background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0;"
                     th:each="review : ${restaurant.reviews}">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <strong style="color: #2c3e50;" th:text="${review.user.username}">User</strong>
                        <span style="background: #fff9db; color: #f08c00; padding: 4px 10px; border-radius: 8px; font-weight: bold;"
                              th:text="${review.rating} + ' ★'">5 ★</span>
                    </div>
                    <p style="color: #555; margin: 0 0 10px 0;" th:text="${review.comment}">Text</p>
                    <small style="color: #bbb; display: block; text-align: right;"
                           th:text="${#temporals.format(review.createdAt, 'dd MMMM yyyy')}">Date</small>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <a href="/customer/restaurants" style="text-decoration: none; color: #79a0c3;">&larr; Back to
                Restaurants</a>
        </div>
    </div>
</div>

<div th:replace="~{ai_chat :: ai-chat}"></div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
