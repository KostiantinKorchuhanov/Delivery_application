<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="auth-container">
    <h2>Login</h2>

    <div style="color: #ff6b6b; margin-bottom: 15px; font-weight: bold;" th:if="${param.error}">
        Invalid username or password.
    </div>
    <div style="color: #51cf66; margin-bottom: 15px; font-weight: bold;" th:if="${param.logout}">
        You have been logged out.
    </div>

    <form method="post" th:action="@{/login}">
        <div class="input-group">
            <label>Username</label>
            <input name="username" placeholder="Enter username" required type="text">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input name="password" placeholder="••••••••" required type="password">
        </div>

        <button class="btn-primary" type="submit">Sign In</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a th:href="@{/register}">Register here</a>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
