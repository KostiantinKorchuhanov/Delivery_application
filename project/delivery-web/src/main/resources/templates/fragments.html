<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div class="kk-navbar" style="background: rgba(44, 62, 80, 0.95); border-bottom: 2px solid #79a0c3; padding: 15px 0;"
     th:fragment="navbar">
    <div class="kk-container"
         style="display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto;">

        <a class="kk-logo"
           style="font-size: 1.5rem; font-weight: bold; text-decoration: none; color: #ffffff;"
           th:href="${session.user != null && session.user.class.simpleName == 'Driver' ? '/driver/dashboard' : '/'}">
            Food<span style="color: #79a0c3;">App</span>
        </a>

        <div class="kk-nav-box" style="display: flex; align-items: center; gap: 20px;">
            <a class="kk-link" href="/about" style="text-decoration: none; color: #ecf0f1; font-weight: 600;">About</a>

            <th:block th:if="${session.user != null}">
                <th:block th:if="${session.user.class.simpleName == 'Customer'}">
                    <a class="kk-link" href="/customer/orders/my"
                       style="text-decoration: none; color: #ecf0f1; font-weight: 600;">My Orders</a>
                    <a class="kk-link" style="text-decoration: none; color: #ecf0f1; font-weight: 600;"
                       th:href="@{/customer/cart}">
                        Cart (<span th:text="${cartSize != null ? cartSize : 0}">0</span>)
                    </a>
                </th:block>

                <div class="kk-user-info"
                     style="display: flex; align-items: center; gap: 15px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;">
                    <a href="/profile" style="text-decoration: none; color: #ffffff; font-weight: bold;">
                        Hi, <span th:text="${session.user.username}">User</span>
                    </a>
                    <form method="post" style="margin: 0;" th:action="@{/logout}">
                        <button style="background: #ff6b6b; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold;"
                                type="submit">
                            Logout
                        </button>
                    </form>
                </div>
            </th:block>

            <th:block th:if="${session.user == null}">
                <a class="kk-link" style="text-decoration: none; color: #ecf0f1; font-weight: 600;" th:href="@{/login}">Login</a>
                <a style="background: #79a0c3; color: white; padding: 8px 18px; border-radius: 6px; text-decoration: none; font-weight: bold;"
                   th:href="@{/register}">Register</a>
            </th:block>
        </div>
    </div>
</div>

<div class="kk-footer" style="background: #2c3e50; color: #ecf0f1; padding: 30px 0; margin-top: 50px;"
     th:fragment="footer">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto;">
        <div>
            <p style="margin: 0; color: #ffffff;">© 2026 <strong>FoodApp</strong></p>
            <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: #bdc3c7;">Created by Kostiantyn Korchuhanov</p>
        </div>
        <div>
            <a href="mailto:kostiantyn.korchuhanov@stud.vilniustech.lt"
               style="color: #79a0c3 !important; text-decoration: none; font-weight: 500;">
                kostiantyn.korchuhanov@stud.vilniustech.lt
            </a>
        </div>
    </div>
</div>

</body>
</html>
